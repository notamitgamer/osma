name: Manual Bulk CSV Extractor

on:
  workflow_dispatch: # This allows you to manually trigger it from the Actions tab

permissions:
  contents: write

jobs:
  extract-csv:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Ensure Data Directory
        run: mkdir -p data

      - name: Extract NPM to CSV
        run: python scripts/extract_npm_csv.py

      - name: Extract PyPI to CSV
        run: python scripts/extract_pypi_csv.py

      - name: Commit and Push CSVs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/*.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore: manual bulk data extraction to CSV" && git push)
