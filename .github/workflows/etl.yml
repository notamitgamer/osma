name: OSMA ETL Pipeline

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight UTC
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  run-etl:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Run NPM Extraction
        run: python scripts/extract_npm.py

      - name: Run PyPI Extraction
        run: python scripts/extract_pypi.py

      - name: Run Upsert (Chunking & Indexing)
        run: python scripts/upsert.py
        
      - name: Sync Global Stats
        run: python scripts/sync_stats.py

      - name: Commit and Push Changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/ state/ stats/
          git diff --quiet && git diff --staged --quiet || (git commit -m "chore(data): auto-update package metadata [skip ci]" && git push)
